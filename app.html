<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo Manager</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Todo Manager</h1>

<input id="search" placeholder="Search..." />

<div class="newTodo">

<input id="title" placeholder="Title" />
<select id="priority">
    <option>High</option>
    <option selected>Medium</option>
    <option>Low</option>
</select>

<textarea id="notes" placeholder="Notes"></textarea>
<textarea id="commands" placeholder="Commands"></textarea>

<button onclick="addTodo()">Add Todo</button>

</div>

<hr>

<div id="todoList"></div>

</div>

<!-- ================= MODAL ================= -->

<div id="editModal" class="modal">

    <div class="modalContent">

        <h2>Edit Todo</h2>

        <input id="editTitle" placeholder="Title">

        <select id="editPriority">
            <option>High</option>
            <option>Medium</option>
            <option>Low</option>
        </select>

        <textarea id="editNotes" placeholder="Notes"></textarea>

        <textarea id="editCommands" placeholder="Commands"></textarea>

        <div class="buttons">
            <button onclick="saveEdit()">Save</button>
            <button onclick="closeEdit()">Cancel</button>
        </div>

    </div>

</div>

<script src="todo.js"></script>

<script>

let editingId = null;

// --------------------
// RENDER
// --------------------

function escapeHTML(str = "") {
    return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
}

function render(list = todoManager.getTodos()) {
    const container = document.getElementById("todoList");
    container.innerHTML = "";

    list.forEach(todo => {

        const div = document.createElement("div");
        div.className = "todoCard";

        div.innerHTML = `
            <h2>${escapeHTML(todo.title)}</h2>

            <div class="priority ${todo.priority.toLowerCase()}">
                Priority: <strong>${todo.priority}</strong>
            </div>

            <div class="status">
                ${todo.completed ? "Completed" : "Pending"}
            </div>

            <div class="notes">
                ${escapeHTML(todo.notes).replaceAll("\n", "<br>")}
            </div>

            <pre class="commands">${escapeHTML(todo.commands || "")}</pre>

            <div class="buttons">

                <button onclick="copyCmd('${todo.id}')">Copy</button>
                <button onclick="openEdit('${todo.id}')">Edit</button>
                <button onclick="toggle('${todo.id}')">
                    ${todo.completed ? "Undo" : "Done"}
                </button>
                <button onclick="del('${todo.id}')">Delete</button>

            </div>
        `;

        container.appendChild(div);
    });
}

// --------------------
// ADD
// --------------------

function addTodo() {
    const title = document.getElementById("title").value.trim();
    const notes = document.getElementById("notes").value;
    const priority = document.getElementById("priority").value;
    const commands = document.getElementById("commands").value;

    if (!title) return alert("Title required");

    todoManager.addTodo(title, notes, priority, commands);

    document.getElementById("title").value = "";
    document.getElementById("notes").value = "";
    document.getElementById("commands").value = "";

    render();
}

// --------------------
// EDIT (MODAL SYSTEM)
// --------------------

function openEdit(id) {
    const todo = todoManager.getTodos().find(t => t.id == id);
    if (!todo) return;

    editingId = id;

    document.getElementById("editTitle").value = todo.title;
    document.getElementById("editPriority").value = todo.priority;
    document.getElementById("editNotes").value = todo.notes;
    document.getElementById("editCommands").value = todo.commands;

    document.getElementById("editModal").classList.add("show");
}

function saveEdit() {
    todoManager.updateTodo(editingId, {
        title: document.getElementById("editTitle").value,
        priority: document.getElementById("editPriority").value,
        notes: document.getElementById("editNotes").value,
        commands: document.getElementById("editCommands").value
    });

    closeEdit();
    render();
}

function closeEdit() {
    document.getElementById("editModal").classList.remove("show");
    editingId = null;
}

// --------------------
// ACTIONS
// --------------------

function toggle(id) {
    todoManager.toggleComplete(id);
    render();
}

function del(id) {
    todoManager.removeTodo(id);
    render();
}

function copyCmd(id) {
    const todo = todoManager.getTodos().find(t => t.id == id);
    navigator.clipboard.writeText(todo.commands || "");
    alert("Copied");
}

// --------------------
// SEARCH
// --------------------

document.getElementById("search").addEventListener("input", e => {
    const q = e.target.value;
    render(q ? todoManager.search(q) : undefined);
});

// INIT
render();

</script>

</body>
</html>
